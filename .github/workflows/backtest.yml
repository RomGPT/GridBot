name: Run backtests automatically

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtest for BTCUSDT
        run: |
          python run_v5plus_vt.py --symbol BTCUSDT --data ./BTCUSDT.csv.gz --tz UTC --tf 60min --mode trend --donch 2880 --adx-thresh 25 --max-lev 1 --target-vol 1000000000 --vol-win 1440 --no-tp --be-R 1.5 --cooldown 12

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            results_BTCUSDT_vt.parquet
            equity_1000.csv
